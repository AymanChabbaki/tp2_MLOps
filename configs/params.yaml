# Configuration du pipeline MLOps

data:
  raw_path: "data/raw/client_data.csv"
  processed_dir: "data/processed"
  train_path: "data/processed/train.csv"
  test_path: "data/processed/test.csv"
  split_ratio: 0.2
  random_state: 42

model:
  n_estimators: 100
  max_depth: 6
  class_weight: "balanced"
  random_state: 42

evaluation:
  min_auc: 0.70

mlflow:
  experiment_name: "Credit_Risk_Scoring"
  model_name: "Credit_Risk_Model"
  tracking_uri: "http://localhost:5000"  # Peut être surchargé par MLFLOW_TRACKING_URI
